name: CI

on:
  push:
    branches: [main]
    paths: ["fermiscope/**"]
  pull_request:
    paths: ["fermiscope/**"]

defaults:
  run:
    working-directory: fermiscope

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (dev)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts
      - name: mypy
        run: mypy
      - name: pytest
        run: pytest -q
      - name: JavaScript syntax check
        run: |
          for f in web/static/js/*.js; do node --check "$f"; done

  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Wheel smoke test (demo + serve + static, non-editable)
        run: bash scripts/wheel_smoke_test.sh

  docker-build:
    runs-on: ubuntu-latest
    continue-on-error: true  # Docker が使えない環境では失敗を許容
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t fermiscope:ci fermiscope
