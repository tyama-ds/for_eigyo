<h1>ピアノのある家庭は1割 内閣府調査</h1>
<p>発行: 生活ニュース編集部</p>
<p>掲載日: 2024年4月20日</p>
<p>データ出所: https://esri.example-gov.jp/shouhi/piano-ownership.csv</p>
<p>
内閣府の消費動向調査によると、ピアノの普及率は10.4%だった。
ピアノのある家庭はおよそ1割にとどまり、住宅事情や電子ピアノへの移行が背景にあるとみられる。
</p>
