<p>発行: 総務省統計局</p>

<p>調査時点: 2020年10月1日</p>
<p>対象地域: 東京都</p>
<p>調査対象: 一般世帯</p>
<p>調査方法: 国勢調査(全数調査)。調査員による全世帯の調査票回収およびオンライン回答。</p>
<p>定義: 一般世帯数(施設等の世帯を除く)</p>

  <tr><td>全国</td><td>55,704,949世帯</td><td>126,146,099人</td></tr>

<p>本表は国勢調査の確定値である。</p>
