<body>
<h1>家庭用ピアノの調律実施状況調査 2023</h1>
<p>発行: 全国楽器技術者組合</p>
<p>公表日: 2023年9月20日</p>
<p>調査時点: 2023年</p>
<p>対象地域: 日本</p>
<p>調査対象: 家庭で保有されるアコースティックピアノ</p>
<p>調査方法: 会員経由の家庭訪問記録 12,000件の集計(2023年)</p>
<p>定義: 調律実施率は1年間に1回以上調律された家庭用ピアノの割合</p>
<p>
家庭で保有されるピアノのうち、1年間に1回以上調律されるのは約35%にとどまる
(推定範囲 25%〜45%)。メーカーは年1回の調律を推奨しているが、
長期間調律されないまま保有されるピアノが多数を占める。
</p>
