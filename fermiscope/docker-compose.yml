services:
  fermiscope:
    build: .
    # アプリには認証機構がないため、ホストのループバックにのみ公開する。
    # LAN やインターネットへ公開する場合は、必ずリバースプロキシで認証をかけること。
    ports:
      - "127.0.0.1:8720:8720"
    environment:
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-mock}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-noop}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Anthropic 設定
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-}
      # 共通プロキシ / DB / 反復数・検索上限 / Selenium / Host許可
      FERMISCOPE_HTTP_PROXY: ${FERMISCOPE_HTTP_PROXY:-}
      FERMISCOPE_DATABASE_URL: ${FERMISCOPE_DATABASE_URL:-sqlite:////data/fermiscope.db}
      FERMISCOPE_MC_ITERATIONS: ${FERMISCOPE_MC_ITERATIONS:-}
      FERMISCOPE_MAX_SEARCHES: ${FERMISCOPE_MAX_SEARCHES:-}
      FERMISCOPE_USE_SELENIUM: ${FERMISCOPE_USE_SELENIUM:-}
      FERMISCOPE_ALLOWED_HOSTS: ${FERMISCOPE_ALLOWED_HOSTS:-}
      FERMISCOPE_APP_NAME: ${FERMISCOPE_APP_NAME:-FermiScope}
      FERMISCOPE_DATA_DIR: /data
    volumes:
      - fermiscope-data:/data

volumes:
  fermiscope-data:
